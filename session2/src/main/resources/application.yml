spring:
    application:
        name: session2

    datasource:
        url: jdbc:postgresql://localhost:5432/session2_db
        username: postgres
        password: your_password
        driver-class-name: org.postgresql.Driver

    jpa:
        show-sql: true
        hibernate:
            ddl-auto: update
        database: postgresql
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.PostgreSQLDialect

server:
    port: 8080

logging:
    level:
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE
